services:
  dnsx_service:
    container_name: dnsx_service
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    build:
      context: .
      dockerfile: dnsx_service/Dockerfile
    ports:
      - "8231:8231"
    healthcheck:
      test:
        [ "CMD", "curl", "-f", "http://dnsx_service:8231/dnsx/health_check" ]
      interval: 60s
      retries: 5

  subfinder_service:
    container_name: subfinder_service
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    build:
      context: .
      dockerfile: subfinder_service/Dockerfile
    ports:
      - "8230:8230"
    healthcheck:
      test:
        [ "CMD", "curl", "-f", "http://subfinder_service:8230/subfinder/health_check" ]
      interval: 60s
      retries: 5
  feroxbuster_service:
    container_name: feroxbuster_service
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    build:
      context: .
      dockerfile: feroxbuster_service/Dockerfile
    ports:
      - "8232:8232"
    healthcheck:
      test:
        [ "CMD", "curl", "-f", "http://feroxbuster_service:8232/feroxbuster/health_check" ]
      interval: 60s
      retries: 5

  naabu_service:
    container_name: naabu_service
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    build:
      context: .
      dockerfile: naabu_service/Dockerfile
    ports:
      - "8337:8337"
    healthcheck:
      test:
        [ "CMD", "curl", "-f", "http://naabu_service:8337/naabu/health_check" ]
      interval: 60s
      retries: 5
  
  nmap_service:
    container_name: nmap_service
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    build:
      context: .
      dockerfile: nmap_service/Dockerfile
    ports:
      - "9001:9001"
    healthcheck:
      test:
        [ "CMD", "curl", "-f", "http://nmap_service:9001/nmap/health_check" ]
      interval: 60s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    networks:
      - app
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
# for test kafka
  kafka-ui:
    image: redpandadata/console:latest
    container_name: kafka_ui
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=kafka:9092
    ports:
      - "8099:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app

  db_auth_service:
    image: mysql:9.3
    container_name: db_auth_service
    restart: unless-stopped
    volumes:
      - auth:/var/lib/mysql
    env_file:
      - auth_service/.env_db
    networks:
      - app
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 60s
      retries: 5

  auth_service:
    container_name: auth_service
    build:
      context: auth_service/
      dockerfile: ./Dockerfile

    depends_on:
      db_auth_service:
        condition: service_healthy
      redis:
        condition: service_started

    env_file:
      - auth_service/.env
    networks:
      - app

    healthcheck:
      test:
        [ "CMD", "curl", "-f", "http://auth_service:8228/users/health_check" ]
      interval: 60s
      retries: 5

  db_core_service:
    image: mysql:9.3
    container_name: db_core_service
    command:
      - "--port=3307"
    restart: unless-stopped
    volumes:
      - core:/var/lib/mysql
    env_file:
      - core_service/.env_db
    networks:
      - app
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 5s
      retries: 5

  core_service:
    container_name: core_service
    build:
      context: core_service/
      dockerfile: ./Dockerfile
    depends_on:
      db_core_service:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - core_service/.env
    networks:
      - app
    healthcheck:
      test:
        [ "CMD", "curl", "-f", "http://core_service:8229/core/health_check" ]
      interval: 60s
      retries: 5

  kraken_d:
    container_name: kraken_d
    build:
      context: ./kraken_d
      dockerfile: ./Dockerfile
    depends_on:
      auth_service:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - app

  redis:
    image: redis:8.0.2
    container_name: redis
    restart: always
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  auth:
    driver: local
  core:
    driver: local